quarkus.application.name=snake-agent-${AGENT_ID:agent-1}
quarkus.http.port=8080

# JIB container image (build with: mvn package -Dquarkus.container-image.build=true)
quarkus.container-image.group=snake
quarkus.container-image.name=snake-agent
quarkus.container-image.tag=latest
quarkus.jib.base-jvm-image=eclipse-temurin:26-jre

agent.id=${AGENT_ID:agent-1}

# Pulsar
mp.messaging.connector.smallrye-pulsar.serviceUrl=${PULSAR_SERVICE_URL:pulsar://localhost:6650}

# Per-agent perception topic (one topic per agent, named by AGENT_ID)
mp.messaging.incoming.agent-perception.connector=smallrye-pulsar
mp.messaging.incoming.agent-perception.topic=persistent://public/default/snake-agent-state-${AGENT_ID:agent-1}

mp.messaging.outgoing.agent-decisions.connector=smallrye-pulsar
mp.messaging.outgoing.agent-decisions.topic=persistent://public/default/snake-agent-decisions

# LLM (Anthropic)
quarkus.langchain4j.anthropic.api-key=${LLM_API_KEY}
quarkus.langchain4j.anthropic.chat-model.model-id=${AGENT_LLM_MODEL:claude-haiku-4-5-20251001}
quarkus.langchain4j.anthropic.timeout=10s

# OTel -> Tempo
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://lgtm:4317}
quarkus.otel.exporter.otlp.protocol=grpc

# Prometheus metrics at /q/metrics
quarkus.micrometer.export.prometheus.enabled=true
