quarkus.application.name=snake-agent-${AGENT_ID:agent-1}
quarkus.http.port=8080

# JIB container image (build with: mvn package -Dquarkus.container-image.build=true)
quarkus.container-image.group=snake
quarkus.container-image.name=snake-agent
quarkus.container-image.tag=latest
quarkus.jib.base-jvm-image=eclipse-temurin:26-jre

agent.id=${AGENT_ID:agent-1}

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Per-agent perception topic (one topic per agent, named by AGENT_ID)
mp.messaging.incoming.agent-perception.connector=smallrye-kafka
mp.messaging.incoming.agent-perception.topic=snake-agent-state-${AGENT_ID:agent-1}
mp.messaging.incoming.agent-perception.group.id=agent-perception-${AGENT_ID:agent-1}
mp.messaging.incoming.agent-perception.auto.offset.reset=latest
mp.messaging.incoming.agent-perception.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.agent-perception.failure-strategy=dead-letter-queue
mp.messaging.incoming.agent-perception.dead-letter-queue.topic=snake-agent-state-${AGENT_ID:agent-1}-dlq

mp.messaging.outgoing.agent-decisions.connector=smallrye-kafka
mp.messaging.outgoing.agent-decisions.topic=snake-agent-decisions
mp.messaging.outgoing.agent-decisions.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# LLM (OpenAI)
quarkus.langchain4j.openai.api-key=${LLM_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=${AGENT_LLM_MODEL:gpt-4o-mini}
quarkus.langchain4j.openai.timeout=10s

# OTel -> Tempo
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://lgtm:4317}
quarkus.otel.exporter.otlp.protocol=grpc

# Prometheus metrics at /q/metrics
quarkus.micrometer.export.prometheus.enabled=true
