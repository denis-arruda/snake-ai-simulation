quarkus.application.name=snake-engine
quarkus.http.port=8080

# JIB container image (build with: mvn package -Dquarkus.container-image.build=true)
quarkus.container-image.group=snake
quarkus.container-image.name=snake-engine
quarkus.container-image.tag=latest
quarkus.jib.base-jvm-image=eclipse-temurin:26-jre

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mp.messaging.outgoing.render-state.connector=smallrye-kafka
mp.messaging.outgoing.render-state.topic=snake-render-state
mp.messaging.outgoing.render-state.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.agent-decisions.connector=smallrye-kafka
mp.messaging.incoming.agent-decisions.topic=snake-agent-decisions
mp.messaging.incoming.agent-decisions.group.id=engine-decisions
mp.messaging.incoming.agent-decisions.auto.offset.reset=latest
mp.messaging.incoming.agent-decisions.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.agent-decisions.failure-strategy=dead-letter-queue
mp.messaging.incoming.agent-decisions.dead-letter-queue.topic=snake-agent-decisions-dlq

# OTel -> Tempo
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://lgtm:4317}
quarkus.otel.exporter.otlp.protocol=grpc

# Prometheus metrics at /q/metrics
quarkus.micrometer.export.prometheus.enabled=true

# Game settings
game.tick.interval=200ms
game.grid.size=30
game.food.max=5
game.snake.initial-length=3
game.agent.window-size=7
game.agent.perception.topic-base=snake-agent-state
game.decision.max-age-ticks=5
