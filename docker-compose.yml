services:

  # ── Messaging ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-render-state --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-agent-decisions --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-agent-state-agent-1 --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-agent-state-agent-2 --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-agent-decisions-dlq --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-agent-state-agent-1-dlq --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic snake-agent-state-agent-2-dlq --partitions 1 --replication-factor 1

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Application services ───────────────────────────────────────────────────
  engine:
    image: snake/snake-engine:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: on-failure

  agent-1:
    image: snake/snake-agent:latest
    environment:
      AGENT_ID: agent-1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      LLM_API_KEY: ${LLM_API_KEY}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-gpt-4o-mini}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: on-failure

  agent-2:
    image: snake/snake-agent:latest
    environment:
      AGENT_ID: agent-2
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
      LLM_API_KEY: ${LLM_API_KEY}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-gpt-4o-mini}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── Observability (Grafana LGTM — Loki + Grafana + Tempo + Mimir) ──────────
  lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC  (traces + metrics + logs)
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./prometheus/prometheus.yml:/otel-lgtm/prometheus.yaml:ro
